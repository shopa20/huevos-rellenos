<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje Bro</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #FFD700;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        overflow: hidden;
    }

    .container {
        max-width: 800px;
        padding: 20px;
    }

    h1 {
        color: white;
        font-size: 36px;
        line-height: 1.4;
        animation: aparecer 1s ease;
    }

    .question {
        color: pink;
        font-size: 26px;
        margin-top: 30px;
        margin-bottom: 25px;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    button {
        padding: 18px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        background-color: white;
        color: black;
        transition: 0.2s;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
    }

    button:hover {
        transform: scale(1.07);
    }

    /* Animación entrada */
    @keyframes aparecer {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Efecto temblor */
    .shake {
        animation: shake 0.4s;
    }

    @keyframes shake {
        0% { transform: translate(1px, 1px); }
        25% { transform: translate(-2px, 2px); }
        50% { transform: translate(2px, -2px); }
        75% { transform: translate(-2px, -1px); }
        100% { transform: translate(1px, -2px); }
    }
</style>

</head>

<body>

<div class="container">
    <h1>
        Bro, lo que has hecho está guapísimo.  
        Gracias por aportar I+D+i a este grupo de cavernícolas.  
        Te quiero tela.
    </h1>

    <div class="question">
        ¿Me vas a hacer huevos rellenos?
    </div>

    <div class="buttons">
        <button onclick="alert('Sabía que dirías que sí 😎')">SI</button>
        <button onclick="alert('Bro confirmado 💖')">SI, PORQUE TE QUIERO BRO</button>
        <button onclick="hablarBro()">BRO BOTÓN 🔊</button>
    </div>
</div>

<script>
function hablarBro() {
    // Texto optimizado para que diga "BRO" bien
    const texto = "Bro bro bro bro, que pasa bro, bro bro bro, que pasa bro";
    
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";
    voz.rate = 0.9;
    voz.pitch = 1.3;

    speechSynthesis.speak(voz);

    // Efecto temblor
    document.body.classList.add("shake");
    setTimeout(() => {
        document.body.classList.remove("shake");
    }, 400);
}
</script>

</body>
</html>

</body>
</html>
