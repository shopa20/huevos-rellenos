<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mensaje Bro</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background-color: #ffd400;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 24px;
      overflow: hidden;
    }

    .container {
      max-width: 950px;
      width: 100%;
    }

    h1 {
      color: white;
      font-size: clamp(2.4rem, 4.8vw, 4.2rem);
      line-height: 1.25;
      margin: 0 0 28px 0;
      text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
      animation: aparecer 0.9s ease;
    }

    .question {
      color: #ff4fa3;
      font-size: clamp(1.8rem, 3vw, 2.7rem);
      font-weight: 700;
      margin-bottom: 24px;
    }

    .frase-aleatoria {
      min-height: 72px;
      color: #ffffff;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
      font-weight: 700;
      margin: 10px auto 28px auto;
      max-width: 820px;
      padding: 10px 16px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
    }

    button {
      width: min(100%, 560px);
      padding: 18px 22px;
      font-size: 1.25rem;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      background-color: white;
      color: black;
      font-family: "Comic Sans MS", "Comic Sans", cursive;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0,0,0,0.14);
      transition: transform 0.18s ease, box-shadow 0.18s ease;
    }

    button:hover {
      transform: scale(1.05);
      box-shadow: 0 14px 28px rgba(0,0,0,0.18);
    }

    .bro-button {
      font-size: 1.35rem;
    }

    .shake {
      animation: shake 0.45s;
    }

    .flash {
      animation: flash 0.45s;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(26px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-4px, 3px); }
      40% { transform: translate(4px, -3px); }
      60% { transform: translate(-3px, 2px); }
      80% { transform: translate(3px, -2px); }
      100% { transform: translate(0, 0); }
    }

    @keyframes flash {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.12); }
      100% { filter: brightness(1); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>
      Bro, lo que has hecho está guapísimo.<br>
      Gracias por aportar I+D+i a este grupo de cavernícolas.<br>
      Te quiero tela.
    </h1>

    <div class="question">
      ¿Me vas a hacer huevos rellenos?
    </div>

    <div class="frase-aleatoria" id="fraseMostrada">
      Pulsa el botón BRO y a ver qué barbaridad suelta.
    </div>

    <div class="buttons">
      <button onclick="alert('Sabía que dirías que sí 😎')">SI</button>
      <button onclick="alert('SI, PORQUE TE QUIERO BRO 💖')">SI, PORQUE TE QUIERO BRO</button>
      <button class="bro-button" onclick="hablarBro()">BRO BOTÓN 🔊</button>
    </div>
  </div>

  <script>
    const frases = [
      "Bro, esto está mazo guapo.",
      "Literalmente eres cine.",
      "En plan, esto es icónico.",
      "Me da cero cringe decir que te quiero, bro.",
      "Qué locura, chaval.",
      "Esto es demasiado épico.",
      "Full postureo del bueno.",
      "LOL, pero de verdad.",
      "Ni tan mal, la verdad.",
      "De locos, bro.",
      "Vaya fantasía.",
      "Está to' chetado.",
      "Eso renta muchísimo.",
      "Tú sirves, bro.",
      "Basadísimo.",
      "Se viene cosita.",
      "Esto tiene aura.",
      "Qué barbaridad, tronco.",
      "Menuda ida de olla.",
      "Está increíble, no fake.",
      "Hostia tú, esto está increíble.",
      "Es que te meto una hostia... de cariño, bro.",
      "Tú estás loco, pero para bien.",
      "Qué cojones acabo de ver, bro.",
      "Es una barbaridad esto, eh."
    ];

    function obtenerVozEspanola() {
      const voces = speechSynthesis.getVoices();
      return (
        voces.find(v => v.lang && v.lang.toLowerCase().startsWith("es-es")) ||
        voces.find(v => v.lang && v.lang.toLowerCase().startsWith("es")) ||
        null
      );
    }

    function hablarTexto(texto, rate = 1, pitch = 1.1) {
      const utterance = new SpeechSynthesisUtterance(texto);
      utterance.lang = "es-ES";
      utterance.rate = rate;
      utterance.pitch = pitch;
      const voz = obtenerVozEspanola();
      if (voz) utterance.voice = voz;
      speechSynthesis.speak(utterance);
    }

    function hablarBro() {
      speechSynthesis.cancel();

      const frase = frases[Math.floor(Math.random() * frases.length)];
      document.getElementById("fraseMostrada").textContent = frase;

      document.body.classList.remove("shake", "flash");
      void document.body.offsetWidth;
      document.body.classList.add("shake", "flash");

      // Truco: "broh" suele sonar mejor que "bro" en muchos TTS
      hablarTexto("broh, broh, broh... qué pasa broh", 0.92, 1.15);

      setTimeout(() => {
        hablarTexto(frase, 0.98, 1.08);
      }, 1700);

      setTimeout(() => {
        document.body.classList.remove("shake", "flash");
      }, 500);
    }

    // Algunos navegadores cargan voces con retraso
    window.speechSynthesis.onvoiceschanged = () => {
      speechSynthesis.getVoices();
    };
  </script>
</body>
</html>

</body>
</html>
