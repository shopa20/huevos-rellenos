<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mensaje Bro</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background-color: #FFD700; /* amarillo */
        font-family: "Comic Sans MS", "Comic Sans", cursive;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
    }

    .container {
        max-width: 700px;
        padding: 20px;
    }

    h1 {
        color: white;
        font-size: 28px;
        line-height: 1.4;
    }

    .question {
        color: pink;
        font-size: 22px;
        margin-top: 30px;
        margin-bottom: 20px;
    }

    .buttons {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background-color: white;
        color: black;
        transition: 0.2s;
        font-family: "Comic Sans MS", "Comic Sans", cursive;
    }

    button:hover {
        transform: scale(1.05);
    }
</style>

</head>

<body>

<div class="container">
    <h1>
        Bro, lo que has hecho está guapísimo.  
        Gracias por aportar I+D+i a este grupo de cavernícolas.  
        Te quiero tela.
    </h1>

    <div class="question">
        ¿Me vas a hacer huevos rellenos?
    </div>

    <div class="buttons">
        <button onclick="alert('Sabía que dirías que sí 😎')">SI</button>
        <button onclick="alert('Bro confirmado 💖')">SI, PORQUE TE QUIERO BRO</button>
        <button onclick="hablarBro()">BRO BOTÓN 🔊</button>
    </div>
</div>

<script>
function hablarBro() {
    const texto = "BRO BRO BRO BRO QUE PASA BRO BRO BRO QUE PASA";
    const voz = new SpeechSynthesisUtterance(texto);
    voz.lang = "es-ES";
    voz.rate = 1.1;
    voz.pitch = 1.2;
    speechSynthesis.speak(voz);
}
</script>

</body>
</html>
